<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Vistoria Prévia - Editor Local</title>
    <link rel="stylesheet" href="editor.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilo para o botão flutuante no canto inferior direito */
        .btn-floating {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 999;
            background-color: #2c3e50;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s, background-color 0.2s;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        .btn-floating:hover {
            background-color: #34495e;
            transform: scale(1.05);
            color: white;
        }
        
        /* Estilos para o Modal de Vídeo */
        .modal-video {
            display: none; /* Escondido por padrão */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background-color: #000;
            padding: 5px;
            border-radius: 8px;
            width: 90%;
            max-width: 800px;
            position: relative;
        }
        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        video {
            width: 100%;
            border-radius: 4px;
            display: block;
        }

        /* Ajuste para não aparecer na impressão */
        @media print {
            .btn-floating, .btn-back, .modal-video {
                display: none !important;
            }
        }
    </style>
</head>
<body class="editor-body">

    <header class="main-header">
        <div class="header-left">
            <a href="https://apps.powerapps.com/play/e/51739d00-ae84-e29e-95a4-da2081ff1a0f/app/01291b5a-b3b7-42e6-925d-bbda935d5538?tenantId=81c5408a-c8f7-459e-bd30-8d4071263391&sourcehint=3&hint=cd10abae-9f79-42d9-b85a-9a5b1746cdd4&sourcetime=1776356061297&source=portal#" class="btn-back" title="Voltar / Limpar">
                <i class="fas fa-arrow-left"></i> Voltar
            </a>
        </div>
        
        <h1>Relatório de Vistoria Prévia</h1>
        
        <div class="header-actions">
            <input type="file" id="inpImportar" accept=".json" style="display:none;" />
            <label for="inpImportar" class="btn secondary">
                <i class="fas fa-file-import"></i> Importar Dados
            </label>

            <button id="btnExportar" class="btn secondary" type="button">
                <i class="fas fa-file-export"></i> Exportar Dados
            </button>

            <button id="btnImprimir" class="btn primary" type="button">
                <i class="fas fa-print"></i> Imprimir / PDF
            </button>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <h4>Capa</h4>
            <div class="group">
                <label for="inpUnidade">Unidade</label>
                <input id="inpUnidade" type="text" autocomplete="off" />
                <label for="inpData">Data</label>
                <input id="inpData" type="date" />
                <button id="btnAplicar" class="btn block" type="button">Atualizar capa</button>
            </div>

            <h4>Novo Setor</h4>
            <div class="group">
                <label for="inpSetor">Nome do setor</label>
                <input id="inpSetor" type="text"/>

                <div class="file-wrap">
                    <label>Imagens (até 6)</label>
                    <input id="inpImgs" type="file" accept="image/*" multiple style="display:none;" />
                    <label for="inpImgs" class="file-btn">
                        <i class="fas fa-camera"></i> Selecionar imagens
                    </label>
                    <div id="fileHint" class="file-hint">Nenhum arquivo selecionado</div>
                </div>

                <label for="inpDesc">Descrição</label>
                <textarea id="inpDesc" placeholder="Descreva o setor..."></textarea>

                <button id="btnAddSetor" class="btn block" type="button">
                    <i class="fas fa-plus"></i> Adicionar setor
                </button>
            </div>

            <h4>Setores Criados</h4>
            <div id="sectorsList" class="sectors-list">
                <div class="file-hint" style="text-align:center; padding:10px;">Nenhum setor adicionado</div>
            </div>

            <h4>Planilha de Resumo</h4>
            <div class="group">
                <div class="file-wrap">
                    <input id="inpPlanilha" type="file" accept="image/*" style="display:none;" />
                    <label for="inpPlanilha" class="file-btn">
                        <i class="fas fa-file-excel"></i> Selecionar Planilha
                    </label>
                    <div id="planilhaHint" class="file-hint">Nenhuma imagem selecionada</div>
                </div>
                <button id="btnRemoverPlanilha" class="btn ghost block" type="button" style="display:none; margin-top:5px;">
                    <i class="fas fa-trash"></i> Remover Planilha
                </button>
            </div>
        </aside>

        <main class="workspace">
            <section class="canvas">
                <div class="page">
                    <div class="page-inner">
                        <div class="center-block">
                            <h1 class="titulo">RELATÓRIO DE VISTORIA PRÉVIA</h1>
                            <h3 class="unidade" id="txtUnidade">Unidade</h3>
                        </div>
                        <div class="etiqueta">
                            <strong>Elaborado por:</strong><br />
                            Departamento de Operações com Produto
                        </div>
                        <footer class="page-footer">
                            Maringá, <span id="txtData">Data</span>
                        </footer>
                    </div>
                </div>
            </section>

            <section class="doc-stack" id="docStack"></section>
        </main>
    </div>

    <!-- Botão Flutuante Como Usar -->
    <button id="btnComoUsar" class="btn-floating" title="Assista ao tutorial">
        <i class="fas fa-video"></i> Como usar
    </button>

    <!-- Modal de Vídeo -->
    <div id="videoModal" class="modal-video">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times; Fechar</span>
            <video id="tutorialVideo" controls>
                <source src="assets/tutorial.mp4" type="video/mp4" >
                Seu navegador não suporta vídeos.
            </video>
        </div>
    </div>

    <!-- Scripts (Sem Firebase) -->
    <script src="utils.js"></script>
    <script src="editor.js"></script>
</body>
</html>
