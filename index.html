<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Capa – Relatório de Vistoria Prévia</title>
  <style>
    :root{
      --page-w: 210mm;          /* A4 */
      --page-h: 297mm;          /* A4 */

      /* Margens internas (conteúdo) */
      --marg: 30mm;             /* capa */
      --content-pad: 20mm;      /* páginas de setores */

      --font: "Segoe UI", Arial, Helvetica, sans-serif;
      --texto: #000;
      --cinza-borda: #d9d9d9;

      /* Galeria (2x2, blocos iguais) */
      --img-h: 60mm;            /* altura de cada foto */
      --gal-gap: 6mm;

      /* Menu lateral */
      --sidebar-w: 290px;
      --accent: #2f66f2;
    }

    *{ box-sizing: border-box; }
    body{
      margin:0;
      font-family: var(--font);
      color:var(--texto);
      background:#f5f7fb;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== MENU LATERAL ===== */
    .sidebar{
      position: fixed;
      inset: 0 auto 0 0;
      width: var(--sidebar-w);
      background:#fff;
      border-right:1px solid #e5e5e5;
      padding: 14px 14px 16px;
      overflow:auto;
    }
    .sidebar h4{
      margin: 2px 0 10px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing:.2px;
      text-transform: uppercase;
      color:#222;
    }
    .group{ display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
    .sidebar label{ font-size:12px; font-weight:600; color:#333; }
    .sidebar input[type="text"],
    .sidebar input[type="date"],
    .sidebar textarea{
      width:100%;
      padding:10px 12px;
      border:1px solid #cfd3da;
      border-radius:8px;
      font-size:14px;
      background:#fff;
    }
    .sidebar textarea{
      min-height: 110px;
      resize: vertical;
    }

    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      gap:8px; height:38px; padding:0 14px; border-radius:8px;
      border:1px solid var(--accent); background:var(--accent); color:#fff;
      font-weight:700; cursor:pointer; text-decoration:none; user-select:none;
    }
    .btn.ghost{ background:#fff; color:var(--accent); }
    .btn.block{ width:100%; }

    /* Upload estilizado */
    .file-wrap{ display:flex; flex-direction:column; gap:6px; }
    #inpImgs{ display:none; }
    .file-btn{
      display:inline-flex; align-items:center; gap:8px;
      padding:10px 12px; border-radius:8px; cursor:pointer; user-select:none;
      border:1px dashed var(--accent); color:var(--accent); background:#f6f9ff;
      font-weight:700; width:100%; justify-content:center;
    }
    .file-hint{ font-size:12px; color:#666; min-height:16px; }

    .divider{ height:1px; background:#e9ebf0; margin:10px 0; }

    /* ===== ÁREA DE TRABALHO ===== */
    .workspace{
      margin-left: calc(var(--sidebar-w) + 18px);
      padding: 18px;
    }

    /* Capa – preview com fundo */
    .canvas{ display:flex; align-items:flex-start; justify-content:center; padding: 0 0 28px; }
    .page{
      position: relative;
      width: var(--page-w);
      height: var(--page-h);
      background: url('image.png') left top / cover no-repeat;  /* fundo na visualização */
      box-shadow: 0 12px 40px rgba(0,0,0,.12);
      overflow: hidden;
    }
    .page-inner{
      height: 100%;
      padding: var(--marg);
      display:flex; flex-direction: column;
    }
    .center-block{
      flex:1; display:flex; align-items:center; justify-content:flex-start;
      flex-direction:column; text-align:center;
    }
    .titulo{ font-size:25px; line-height:1.5; letter-spacing:.2px; font-weight:800; text-transform:uppercase; margin:0; }
    .unidade{ font-size:25px; font-weight:700; margin:0; }

    .etiqueta{
      align-self:flex-end; margin-right:6mm; margin-bottom:18mm;
      border-radius:3px; padding:6px 10px; font-size:16px; line-height:1.25;
      min-width:220px; text-align:right; break-inside:avoid; page-break-inside:avoid;
    }
    .etiqueta strong{ font-weight:700; }
    footer{
      text-align:center; font-size:16px; color:#111; margin-top:auto; padding-bottom:2mm;
      break-inside:avoid; page-break-inside:avoid;
    }

    /* ===== DOCUMENTO (1 PÁGINA POR SETOR) ===== */
    .doc-stack{ display:flex; flex-direction:column; gap:24px; }

    /* Cada página A4 do setor (preview web) */
    .doc-page{
      width: var(--page-w);
      height: var(--page-h);
      margin: 0 auto;
      position: relative;
      background: url('image.png') left top / cover no-repeat;
      box-shadow: 0 12px 40px rgba(0,0,0,.12);
      overflow: hidden;
    }
    .doc-page-inner{
      height: 100%;
      padding: var(--content-pad);
      display: flex;
      flex-direction: column;
    }

    .setor-cabecalho{
      margin-bottom: 6mm;
    }
    .setor-nome{ margin:0 0 2mm 0; font-size:18px; font-weight:700; }
    .descricao{
      margin:0; font-size:14px; line-height:1.6; text-align:justify;
      text-justify:inter-word; hyphens:auto; white-space:pre-wrap;
    }

    /* Galeria 2x2 com blocos iguais */
    .galeria{
      margin-top: 8mm;
      display:grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: var(--img-h) var(--img-h);
      gap: var(--gal-gap);
      align-items:start;
      flex: 1 0 auto;
    }
    .galeria .item{
      width:100%; height:100%; overflow:hidden;
      border:1px solid var(--cinza-borda); border-radius:6px; background:#fff;
    }
    .galeria .item.empty{
      background: repeating-linear-gradient(45deg, #f8f8f8 0 10px, #ffffff 10px 20px);
      border:1px dashed #c9c9c9;
    }
    .galeria img{
      width:100%; height:100%; object-fit:cover; object-position:center; display:block;
    }

    /* Impressão: full-bleed + fundo em todas as páginas */
    @page{ size:A4; margin:0; }
    @media print{
      body{ background:white; }
      .sidebar{ display:none !important; }
      .workspace{ margin:0 !important; padding:0 !important; }

      /* Fundo em TODAS as páginas */
      body::before{
        content:""; position:fixed; top:0; left:0; width:210mm; height:297mm;
        background:url('image.png') left top / cover no-repeat; z-index:-1;
      }

      .page{
        width: var(--page-w) !important; height: var(--page-h) !important;
        box-shadow:none !important; background:transparent !important;
        page-break-after: always;
      }

      .doc-page{
        width: var(--page-w) !important; height: var(--page-h) !important;
        box-shadow:none !important; background:transparent !important;
        page-break-after: always;
      }
      .doc-stack{ gap:0 !important; }

      *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
    }
  </style>
</head>
<body>

  <!-- ===== MENU LATERAL ===== -->
  <aside class="sidebar" aria-label="Menu lateral">
    <h4>Capa</h4>
    <div class="group">
      <label for="inpUnidade">Unidade</label>
      <input id="inpUnidade" type="text" placeholder="Ex.: Sabáudia" autocomplete="off" />
      <label for="inpData">Data</label>
      <input id="inpData" type="date" />
      <button id="btnAplicar" class="btn block" type="button">Salvar capa</button>
    </div>

    <div class="divider"></div>

    <h4>Novo setor</h4>
    <div class="group">
      <label for="inpSetor">Nome do setor</label>
      <input id="inpSetor" type="text" placeholder="Ex.: Recepção de grãos" />

      <div class="file-wrap">
        <label>Imagens (até 4)</label>
        <input id="inpImgs" type="file" accept="image/*" multiple />
        <label for="inpImgs" class="file-btn">Selecionar imagens</label>
        <div id="fileHint" class="file-hint">Nenhum arquivo selecionado</div>
      </div>

      <label for="inpDesc">Descrição</label>
      <textarea id="inpDesc" placeholder="Descreva o setor, condições, observações..."></textarea>

      <button id="btnAddSetor" class="btn" type="button">Adicionar setor (1 página)</button>
    </div>

    <div class="divider"></div>

    <button id="btnImprimir" class="btn ghost block" type="button">Imprimir / Salvar em PDF</button>
  </aside>

  <!-- ===== ÁREA DE TRABALHO ===== -->
  <main class="workspace">
    <!-- Capa -->
    <section class="canvas">
      <div class="page" aria-label="Página A4 – capa">
        <div class="page-inner">
          <div class="center-block" aria-label="Títulos centrais">
            <h1 class="titulo">RELATÓRIO DE VISTORIA PRÉVIA</h1>
            <h3 class="unidade" id="txtUnidade">Unidade</h3>
          </div>
          <div class="etiqueta" aria-label="Elaborado por">
            <strong>Elaborado por:</strong><br />
            Departamento de Operações com Produto
          </div>
          <footer>
            Maringá, <span id="txtData">10 de Novembro de 2025</span>
          </footer>
        </div>
      </div>
    </section>

    <!-- Documento: cada setor = 1 página -->
    <section class="doc" aria-label="Conteúdo – Setores">
      <div class="doc-stack" id="docStack"></div>
    </section>
  </main>

  <script>
    // ---------- Utilidades ----------
    const meses = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
    const minusculasFixas = new Set(["de","da","do","das","dos","e","a","as","o","os","para","por","com"]);
    const capFirst = s => s ? s.charAt(0).toUpperCase() + s.slice(1) : s;

    function titleCasePtBR(texto){
      if(!texto) return "";
      const palavras = texto.trim().toLowerCase().split(/\s+/);
      return palavras.map((p,i)=> (i>0 && minusculasFixas.has(p)) ? p : p.charAt(0).toUpperCase()+p.slice(1)).join(" ");
    }
    function formatarDataPtBR(iso){
      if(!iso) return "";
      const [y,m,d] = iso.split("-").map(Number);
      if(!y||!m||!d) return "";
      return `${d} de ${capFirst(meses[m-1])} de ${y}`;
    }
    function filesToDataUrls(fileList){
      const files = Array.from(fileList||[]).filter(f=> /^image\//.test(f.type));
      return Promise.all(files.map(file=> new Promise((res,rej)=>{
        const fr = new FileReader(); fr.onload=()=>res(fr.result); fr.onerror=rej; fr.readAsDataURL(file);
      })));
    }

    // ---------- Elementos ----------
    const inpUnidade = document.getElementById("inpUnidade");
    const inpData = document.getElementById("inpData");
    const btnAplicar = document.getElementById("btnAplicar");
    const btnPrint = document.getElementById("btnImprimir");
    const txtUnidade = document.getElementById("txtUnidade");
    const txtData = document.getElementById("txtData");

    const inpSetor = document.getElementById("inpSetor");
    const inpImgs = document.getElementById("inpImgs");
    const inpDesc = document.getElementById("inpDesc");
    const btnAddSetor = document.getElementById("btnAddSetor");
    const fileHint = document.getElementById("fileHint");
    const docStack = document.getElementById("docStack");

    // ---------- Helpers de página ----------
    function createDocPage(){
      const p = document.createElement('div');
      p.className = 'doc-page';
      const inner = document.createElement('div');
      inner.className = 'doc-page-inner';
      p.appendChild(inner);
      return p;
    }

    // ---------- Inicialização ----------
    (function init(){
      const hoje = new Date();
      const yyyy = hoje.getFullYear();
      const mm = String(hoje.getMonth()+1).padStart(2,"0");
      const dd = String(hoje.getDate()).padStart(2,"0");
      inpData.value = `${yyyy}-${mm}-${dd}`;
      fileHint.textContent = "Nenhum arquivo selecionado";
    })();

    // Mostrar quantidade de arquivos selecionados
    inpImgs.addEventListener("change", ()=>{
      const n = inpImgs.files?.length || 0;
      fileHint.textContent = n ? `${n} arquivo(s) selecionado(s)` : "Nenhum arquivo selecionado";
    });

    // ---------- Capa ----------
    function aplicarCapa(){
      const uni = titleCasePtBR(inpUnidade.value || "Unidade");
      txtUnidade.textContent = uni;
      const dataFmt = formatarDataPtBR(inpData.value);
      if (dataFmt) txtData.textContent = dataFmt;
    }
    btnAplicar.addEventListener("click", aplicarCapa);
    [inpUnidade, inpData].forEach(el=>{
      el.addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); aplicarCapa(); } });
    });

    // ---------- Adicionar 1 setor = 1 página ----------
    async function adicionarSetor(){
      const nomeBruto = (inpSetor.value || "").trim();
      const nome = titleCasePtBR(nomeBruto || "Setor");
      const desc = (inpDesc.value || "").trim();

      // Lê imagens (pega só as 4 primeiras)
      const dataUrls = (await filesToDataUrls(inpImgs.files)).slice(0,4);

      // Completa até 4 slots (placeholders vazios)
      while (dataUrls.length < 4) dataUrls.push(null);

      // Cria página
      const page = createDocPage();
      const inner = page.firstElementChild;

      // Cabeçalho (nome + descrição)
      const cab = document.createElement("header");
      cab.className = "setor-cabecalho";
      cab.innerHTML = `
        <h4 class="setor-nome">${nome}</h4>
        <p class="descricao">${desc.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</p>
      `;
      inner.appendChild(cab);

      // Galeria 2x2
      const gal = document.createElement("div");
      gal.className = "galeria";
      dataUrls.forEach(src=>{
        const item = document.createElement("div");
        item.className = "item" + (src ? "" : " empty");
        if (src){
          const img = document.createElement("img");
          img.src = src;
          img.alt = `Imagem do setor ${nome}`;
          item.appendChild(img);
        }
        gal.appendChild(item);
      });
      inner.appendChild(gal);

      // Adiciona à pilha
      docStack.appendChild(page);

      // Limpa campos para próximo setor
      inpSetor.value = ""; inpDesc.value = ""; inpImgs.value = "";
      fileHint.textContent = "Nenhum arquivo selecionado";
      inpSetor.focus();
    }
    btnAddSetor.addEventListener("click", adicionarSetor);
    inpDesc.addEventListener("keydown", (e)=>{ if(e.key==="Enter" && e.ctrlKey){ e.preventDefault(); adicionarSetor(); } });

    // ---------- Imprimir ----------
    btnPrint.addEventListener("click", ()=>{
      aplicarCapa();
      // No diálogo do navegador: habilite “Gráficos de plano de fundo” e desabilite “Cabeçalhos e rodapés”.
      window.print();
    });
  </script>
</body>

</html>
